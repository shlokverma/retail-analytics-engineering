version: 2

models:
  - name: mart_revenue_by_product
    description: "Monthly revenue, quantity sold, order count, and average review rating by product and category. Audience: merchandising and product teams."
    columns:
      - name: product_id
        description: "Unique product identifier."
      - name: product_name
        description: "Name of the product."
      - name: product_type
        description: "Product category — one of six apparel categories."
      - name: year
        description: "Calendar year of the orders contributing to this row."
      - name: month_number
        description: "Numeric month of the orders contributing to this row, 1-12."
      - name: total_revenue
        description: "Sum of line subtotals for this product in this month. Excludes cancelled orders."
      - name: qty_sold
        description: "Total units sold of this product in this month. Excludes cancelled orders."
      - name: order_count
        description: "Number of distinct orders containing this product in this month."
      - name: avg_rating
        description: "Average review rating for this product in this month. NULL if no reviews exist for this product in this month."

  - name: mart_aov_by_category
    description: "Average order value by product category and month. An order is attributed to a category if it contains at least one product from that category. Audience: merchandising and finance teams."
    columns:
      - name: product_type
        description: "Product category — one of six apparel categories."
      - name: year
        description: "Calendar year of the orders contributing to this row."
      - name: month_number
        description: "Numeric month of the orders contributing to this row, 1-12."
      - name: avg_order_value
        description: "Average total order value for orders containing at least one product from this category in this month. Excludes cancelled orders."
      - name: order_count
        description: "Number of distinct orders containing at least one product from this category in this month."

  - name: mart_revenue_concentration
    description: "Monthly revenue share and cumulative revenue percentage by product, ranked by revenue. Used to identify the 80/20 revenue concentration pattern. Audience: merchandising and product teams."
    columns:
      - name: product_id
        description: "Unique product identifier."
      - name: product_name
        description: "Name of the product."
      - name: product_type
        description: "Product category — one of six apparel categories."
      - name: year
        description: "Calendar year."
      - name: month_number
        description: "Numeric month, 1-12."
      - name: total_revenue
        description: "Total revenue for this product in this month."
      - name: revenue_rank
        description: "Rank of this product by revenue within this month. Rank 1 is the highest revenue product."
      - name: revenue_share_pct
        description: "This product's revenue as a percentage of total revenue in this month."
      - name: cumulative_revenue_pct
        description: "Running total of revenue share percentage, ordered by revenue rank. Shows what percentage of total monthly revenue is accounted for by the top N products."

  - name: mart_catalogue_coverage
    description: "Monthly percentage of products with at least one sale, out of total available products. Used to identify how broadly the catalogue is being purchased. Audience: merchandising teams."
    columns:
      - name: year
        description: "Calendar year."
      - name: month_number
        description: "Numeric month, 1-12."
      - name: products_with_sales
        description: "Count of distinct products that had at least one unit sold in this month."
      - name: total_catalogue_size
        description: "Total count of products in the catalogue. Static — does not change month to month in this dataset."
      - name: coverage_rate
        description: "Percentage of catalogue products with at least one sale in this month. Calculated as products_with_sales / total_catalogue_size * 100."

  - name: mart_product_ratings
    description: "All-time average review rating and revenue rank per product. Used to identify products with high revenue but low satisfaction, or high satisfaction but low revenue. Audience: merchandising and product teams."
    columns:
      - name: product_id
        description: "Unique product identifier."
      - name: product_name
        description: "Name of the product."
      - name: product_type
        description: "Product category — one of six apparel categories."
      - name: total_revenue
        description: "All-time total revenue for this product across the full dataset period."
      - name: avg_rating
        description: "All-time average review rating for this product. NULL if no reviews exist for this product."
      - name: revenue_rank
        description: "Rank of this product by all-time total revenue. Rank 1 is the highest revenue product."